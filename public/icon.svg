<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#000000"/>
  <rect x="8" y="8" width="84" height="84" fill="none" stroke="#F5F0E1" stroke-width="2"/>
  <!-- Water drop with magnifying glass -->
  <g transform="translate(50, 50)">
    <!-- Drop shape -->
    <path d="M0,-25 C12,-12 18,5 18,15 C18,25 10,32 0,32 C-10,32 -18,25 -18,15 C-18,5 -12,-12 0,-25 Z" 
          fill="#F5F0E1"/>
    <!-- Magnifying glass circle -->
    <circle cx="0" cy="12" r="8" fill="#000000" stroke="#F5F0E1" stroke-width="2"/>
    <!-- Magnifying glass handle -->
    <line x1="6" y1="18" x2="14" y2="28" stroke="#F5F0E1" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Text: LF -->
  <text x="50" y="90" text-anchor="middle" font-family="serif" font-weight="bold" font-size="12" fill="#F5F0E1">LEAKY FINDERS</text>
</svg>